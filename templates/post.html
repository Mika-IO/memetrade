<article class="post">
  <img class="post-cover" src="{{ cover }}" alt="{{ title }}">
  <header class="post-header">
    <time>{{ date_formatted }}</time>
    <h1>{{ title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a href="../index.html" class="back-link">{{ back_text }}</a>
</article>
